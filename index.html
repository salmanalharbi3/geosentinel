<!DOCTYPE html>
<html>

<head>

<title>GeoSentinel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0f1e;
color:white;
}

h1{
text-align:center;
padding:10px;
}

#map{
height:90vh;
}

</style>

</head>

<body>

<h1>GeoSentinel - OSINT Map</h1>

<div id="map"></div>

<script>

var map = L.map('map').setView([25, 45], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Map data'
}).addTo(map);

var marker = L.marker([24.7136, 46.6753]).addTo(map);

marker.bindPopup("Riyadh").openPopup();

</script>

</body>

</html>
